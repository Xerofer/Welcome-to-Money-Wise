<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — Money Wise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Money Wise design tokens (matches lib/main.dart) ─────────── */
    :root {
      --bg:          #F5F4FF;
      --surface:     #FFFFFF;
      --border:      rgba(0,0,0,0.07);
      --text:        rgba(0,0,0,0.87);
      --text-muted:  rgba(0,0,0,0.55);
      --indigo:      #6366F1;
      --indigo2:     #8B5CF6;
      --green:       #10B981;
      --green2:      #059669;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #0D0D1A;
        --surface:     rgba(255,255,255,0.05);
        --border:      rgba(255,255,255,0.08);
        --text:        rgba(255,255,255,0.95);
        --text-muted:  rgba(255,255,255,0.55);
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-y: auto;
    }

    /* ─── Ambient gradient blobs ─────────────────────────────────── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      opacity: 0;
      animation: orbIn 1.2s ease 0.1s forwards;
    }
    body::before {
      width: 560px; height: 560px;
      top: -200px; left: -160px;
      background: radial-gradient(circle, rgba(99,102,241,0.22) 0%, transparent 70%);
    }
    body::after {
      width: 420px; height: 420px;
      bottom: -120px; right: -120px;
      background: radial-gradient(circle, rgba(16,185,129,0.18) 0%, transparent 70%);
      animation-delay: 0.3s;
    }
    @media (prefers-color-scheme: light) {
      body::before { background: radial-gradient(circle, rgba(99,102,241,0.10) 0%, transparent 70%); }
      body::after  { background: radial-gradient(circle, rgba(16,185,129,0.10) 0%, transparent 70%); }
    }
    @keyframes orbIn { to { opacity: 1; } }

    /* Subtle grid */
    .grid {
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
    }
    @media (prefers-color-scheme: light) {
      .grid {
        background-image:
          linear-gradient(rgba(99,102,241,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99,102,241,0.025) 1px, transparent 1px);
      }
    }

    /* ─── Center wrapper ─────────────────────────────────────────── */
    .center {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 32px 20px;
    }

    /* ─── Card (same family as privacy/reset/verifying) ──────────── */
    .card {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 28px 32px;
      text-align: center;
      box-shadow:
        0 24px 60px rgba(0,0,0,0.30),
        0 0 60px rgba(99,102,241,0.10);
      opacity: 0;
      transform: translateY(8px);
      animation: rise 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }
    @media (prefers-color-scheme: light) {
      .card {
        box-shadow:
          0 16px 40px rgba(99,102,241,0.10),
          0 0 60px rgba(16,185,129,0.06);
      }
    }
    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Logo lockup ────────────────────────────────────────────── */
    .logo {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 28px;
      opacity: 0; animation: fadeUp 0.4s ease 0.55s forwards;
    }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo2) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(99,102,241,0.4);
    }
    .logo-icon svg { width: 20px; height: 20px; fill: white; }
    .logo-name {
      font-size: 15px; font-weight: 800;
      color: var(--text); letter-spacing: -0.2px;
    }

    /* ─── Success check icon — gradient tile with pop animation ──── */
    .icon-wrap {
      width: 84px; height: 84px;
      margin: 0 auto 24px;
      position: relative;
      opacity: 0;
      animation: iconPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s forwards;
    }
    @keyframes iconPop {
      from { opacity: 0; transform: scale(0.4) rotate(-15deg); }
      to   { opacity: 1; transform: scale(1)   rotate(0deg); }
    }
    .icon-glow {
      position: absolute; inset: -14px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16,185,129,0.35), transparent 70%);
      animation: glowPulse 2.2s ease-in-out 1.4s infinite;
    }
    @keyframes glowPulse {
      0%, 100% { transform: scale(1);    opacity: 0.6; }
      50%      { transform: scale(1.15); opacity: 1.0; }
    }
    .icon-tile {
      width: 84px; height: 84px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--green) 0%, var(--green2) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 32px rgba(16,185,129,0.45);
      position: relative;
    }
    /* Subtle top sheen — adds depth */
    .icon-tile::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 50%; border-radius: 22px 22px 0 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), transparent);
    }
    .icon-tile svg {
      width: 42px; height: 42px;
      stroke: white; fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      position: relative; z-index: 1;
      stroke-dasharray: 24;
      stroke-dashoffset: 24;
      animation: drawCheck 0.5s ease 1.0s forwards;
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    /* ─── Text ───────────────────────────────────────────────────── */
    .label {
      font-size: 11px; font-weight: 800;
      letter-spacing: 1.8px; text-transform: uppercase;
      color: var(--green);
      margin-bottom: 10px;
      opacity: 0; animation: fadeUp 0.4s ease 1.1s forwards;
    }
    h1 {
      font-size: clamp(24px, 5vw, 28px);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.25;
      margin-bottom: 10px;
      color: var(--text);
      opacity: 0; animation: fadeUp 0.4s ease 1.25s forwards;
    }
    h1 span {
      background: linear-gradient(135deg, var(--indigo), var(--indigo2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 28px;
      opacity: 0; animation: fadeUp 0.4s ease 1.4s forwards;
    }

    /* ─── Divider ────────────────────────────────────────────────── */
    .divider {
      height: 1px; margin: 0 -28px 24px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      opacity: 0; animation: fadeUp 0.4s ease 1.5s forwards;
    }

    /* ─── Countdown ring ─────────────────────────────────────────── */
    .ring-wrap {
      position: relative; width: 86px; height: 86px;
      margin: 0 auto 14px;
      opacity: 0; animation: fadeUp 0.4s ease 1.6s forwards;
    }
    .ring-svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    .ring-track {
      fill: none;
      stroke: rgba(99,102,241,0.15);
      stroke-width: 4;
    }
    @media (prefers-color-scheme: light) {
      .ring-track { stroke: rgba(99,102,241,0.18); }
    }
    .ring-progress {
      fill: none;
      stroke: url(#rg);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 238.76;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .ring-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .redirect-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
      opacity: 0; animation: fadeUp 0.4s ease 1.7s forwards;
    }
    .redirect-label span {
      color: var(--indigo);
      font-weight: 700;
    }

    /* ─── Primary CTA — same gradient pill as the app ────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo2) 100%);
      color: white !important;
      text-decoration: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.1px;
      box-shadow: 0 8px 20px rgba(99,102,241,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      border: none;
      opacity: 0; animation: fadeUp 0.4s ease 1.8s forwards;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(99,102,241,0.45);
    }
    .btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 16px rgba(99,102,241,0.35);
    }
    .btn svg {
      width: 16px; height: 16px;
      stroke: white; fill: none;
      stroke-width: 2.4;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ─── Footer ─────────────────────────────────────────────────── */
    .footer {
      position: fixed; bottom: 18px; left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0;
      animation: fadeUp 0.4s ease 2.0s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    @media (max-width: 380px) {
      .card { padding: 32px 22px 26px; }
      .icon-wrap, .icon-tile { width: 72px; height: 72px; }
      .icon-tile svg { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>

<div class="grid"></div>

<div class="center">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 18v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v1h-9a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h9zm-9-2h10V8H12v8zm4-2.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
        </svg>
      </div>
      <span class="logo-name">Money Wise</span>
    </div>

    <!-- Success icon -->
    <div class="icon-wrap">
      <div class="icon-glow"></div>
      <div class="icon-tile">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>

    <!-- Text -->
    <p class="label">Account Verified</p>
    <h1>Welcome to <span>Money Wise</span></h1>
    <p class="subtitle">Your email has been confirmed.<br>You'll be taken back to the app automatically.</p>

    <div class="divider"></div>

    <!-- Countdown -->
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 86 86">
        <defs>
          <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#10B981"/>
            <stop offset="100%" stop-color="#6366F1"/>
          </linearGradient>
        </defs>
        <circle class="ring-track"    cx="43" cy="43" r="38"/>
        <circle class="ring-progress" cx="43" cy="43" r="38" id="ringEl"/>
      </svg>
      <div class="ring-num" id="numEl">5</div>
    </div>

    <p class="redirect-label">Redirecting to app in <span id="secEl">5</span>s…</p>

    <a class="btn" id="openBtn" href="#">
      <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open App Now
    </a>

  </div>
</div>

<div class="footer">© 2025 Money Wise — All rights reserved.</div>

<script>
  function getParams() {
    const hash = window.location.hash.substring(1);
    const params = {};
    hash.split('&').forEach(pair => {
      const [k, v] = pair.split('=');
      if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
    });
    return params;
  }

  const params    = getParams();
  const appScheme = 'io.supabase.moneywise://login-callback/';

  function buildAppUrl() {
    const fragment = Object.entries(params)
      .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    return appScheme + (fragment ? '#' + fragment : '');
  }

  const appUrl = buildAppUrl();
  document.getElementById('openBtn').href = appUrl;

  // Countdown
  const TOTAL  = 5;
  const CIRCUM = 2 * Math.PI * 38;
  const ringEl = document.getElementById('ringEl');
  const numEl  = document.getElementById('numEl');
  const secEl  = document.getElementById('secEl');

  ringEl.style.strokeDasharray = CIRCUM;
  ringEl.style.strokeDashoffset = 0;
  let remaining = TOTAL;

  function tick() {
    remaining--;
    numEl.textContent = remaining;
    secEl.textContent = remaining;
    const progress = (TOTAL - remaining) / TOTAL;
    ringEl.style.strokeDashoffset = progress * CIRCUM;
    if (remaining <= 0) openApp();
  }

  function openApp() {
    // Use a hidden iframe to trigger the deep link silently
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = appUrl;
    document.body.appendChild(iframe);
    setTimeout(() => {
      window.location.href = appUrl;
    }, 2000);
  }

  setTimeout(() => {
    const iv = setInterval(() => {
      tick();
      if (remaining <= 0) clearInterval(iv);
    }, 1000);
  }, 1500);
</script>

</body>
</html>
