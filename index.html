<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — Money Wise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0F0F14;
      --surface:   #17171f;
      --indigo:    #748FFC;
      --indigo2:   #4263EB;
      --green:     #51CF66;
      --green2:    #2F9E44;
      --text:      #F3F4F8;
      --muted:     rgba(243,244,248,0.45);
      --border:    rgba(116,143,252,0.18);
      --glow:      rgba(116,143,252,0.25);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ── Ambient background ─────────────────────────────────── */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0;
      animation: orbFloat 3s ease forwards;
    }
    .orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(66,99,235,0.35), transparent 70%);
      top: -160px; left: -120px;
      animation-delay: 0.2s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(81,207,102,0.20), transparent 70%);
      bottom: -100px; right: -80px;
      animation-delay: 0.5s;
    }
    .orb-3 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(116,143,252,0.18), transparent 70%);
      top: 45%; left: 55%;
      animation-delay: 0.8s;
    }
    @keyframes orbFloat {
      to { opacity: 1; }
    }

    /* ── Grid overlay ───────────────────────────────────────── */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(116,143,252,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(116,143,252,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
    }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      text-align: center;
    }

    .inner {
      max-width: 440px; width: 100%;
      background: rgba(23,23,31,0.7);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 40px 44px;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 80px rgba(0,0,0,0.5),
        0 0 60px var(--glow);
      opacity: 0;
      transform: translateY(28px);
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Icon ───────────────────────────────────────────────── */
    .icon-wrap {
      position: relative;
      width: 88px; height: 88px;
      margin: 0 auto 32px;
    }
    .icon-ring {
      position: absolute; inset: -10px;
      border-radius: 50%;
      border: 2px solid transparent;
      background:
        linear-gradient(var(--bg), var(--bg)) padding-box,
        linear-gradient(135deg, var(--green), var(--indigo)) border-box;
      opacity: 0;
      animation: ringIn 0.6s ease 1.1s forwards;
    }
    @keyframes ringIn {
      to { opacity: 1; }
    }
    .icon-bg {
      width: 88px; height: 88px; border-radius: 24px;
      background: linear-gradient(135deg, var(--green2), var(--green));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 40px rgba(47,158,68,0.45);
      transform: scale(0.4) rotate(-20deg);
      opacity: 0;
      animation: iconPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 1s forwards;
    }
    @keyframes iconPop {
      to { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .icon-bg svg {
      width: 44px; height: 44px; stroke: #fff; fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Text ───────────────────────────────────────────────── */
    .label-app {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--indigo); margin-bottom: 14px;
      opacity: 0; animation: fadeUp 0.5s ease 1.4s forwards;
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(26px, 5vw, 34px);
      font-weight: 400; line-height: 1.2;
      color: var(--text); margin-bottom: 8px;
      opacity: 0; animation: fadeUp 0.5s ease 1.55s forwards;
    }
    h1 em {
      font-style: italic;
      background: linear-gradient(90deg, var(--green), var(--indigo));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 14px; font-weight: 400; color: var(--muted);
      line-height: 1.6; margin-bottom: 40px;
      opacity: 0; animation: fadeUp 0.5s ease 1.7s forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Countdown ring ─────────────────────────────────────── */
    .countdown-wrap {
      position: relative; width: 96px; height: 96px;
      margin: 0 auto 28px;
      opacity: 0; animation: fadeUp 0.5s ease 1.85s forwards;
    }
    .countdown-svg {
      position: absolute; inset: 0;
      transform: rotate(-90deg);
    }
    .ring-track {
      fill: none;
      stroke: rgba(116,143,252,0.12);
      stroke-width: 5;
    }
    .ring-progress {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 263.9; /* 2π × 42 */
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .countdown-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 36px; color: var(--text);
    }

    /* ── Redirect label ─────────────────────────────────────── */
    .redirect-label {
      font-size: 13px; color: var(--muted);
      opacity: 0; animation: fadeUp 0.5s ease 2s forwards;
    }
    .redirect-label span {
      color: var(--indigo); font-weight: 500;
    }

    /* ── Manual button (fallback) ───────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 28px; padding: 13px 28px;
      border-radius: 14px; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      color: #fff; letter-spacing: 0.02em;
      background: linear-gradient(135deg, var(--indigo2), var(--indigo));
      box-shadow: 0 8px 28px rgba(66,99,235,0.4);
      text-decoration: none;
      opacity: 0; animation: fadeUp 0.5s ease 2.15s forwards;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(66,99,235,0.5); }
    .btn:active { transform: translateY(0); }
    .btn svg {
      width: 17px; height: 17px; stroke: currentColor; fill: none;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    .footer {
      position: absolute; bottom: 24px; left: 0; right: 0;
      text-align: center;
      font-size: 12px; color: rgba(243,244,248,0.2);
      opacity: 0; animation: fadeUp 0.5s ease 2.3s forwards;
    }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid-overlay"></div>

<div class="card">
  <div class="inner">

    <!-- Icon -->
    <div class="icon-wrap">
      <div class="icon-ring"></div>
      <div class="icon-bg">
        <!-- checkmark -->
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>

    <!-- Text -->
    <p class="label-app">Money Wise</p>
    <h1>Thank you for<br>joining <em>Money Wise</em></h1>
    <p class="subtitle">Your email has been confirmed.<br>You'll be taken back to the app automatically.</p>

    <!-- Countdown -->
    <div class="countdown-wrap">
      <svg class="countdown-svg" viewBox="0 0 96 96">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#51CF66"/>
            <stop offset="100%" stop-color="#748FFC"/>
          </linearGradient>
        </defs>
        <circle class="ring-track"    cx="48" cy="48" r="42"/>
        <circle class="ring-progress" cx="48" cy="48" r="42" id="ringEl"/>
      </svg>
      <div class="countdown-num" id="numEl">5</div>
    </div>

    <p class="redirect-label">Redirecting to the app in <span id="secEl">5</span>s…</p>

    <!-- Manual fallback -->
    <a class="btn" id="openBtn" href="#">
      <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open App Now
    </a>

  </div>
</div>

<div class="footer">© 2025 Money Wise. All rights reserved.</div>

<script>
  // ── Extract tokens from the URL ──────────────────────────────────────────
  // Supabase puts them in the hash fragment: #access_token=...&type=signup&...
  function getFragmentParams() {
    const hash = window.location.hash.substring(1); // strip leading #
    const params = {};
    hash.split('&').forEach(pair => {
      const [k, v] = pair.split('=');
      if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
    });
    return params;
  }

  const params   = getFragmentParams();
  const appScheme = 'io.supabase.moneywise://login-callback/';

  // Rebuild the deep-link with all the original tokens
  function buildAppUrl() {
    const fragment = Object.entries(params)
      .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    return appScheme + (fragment ? '#' + fragment : '');
  }

  const appUrl = buildAppUrl();

  // Set the manual button href
  document.getElementById('openBtn').href = appUrl;

  // ── Countdown + ring animation ───────────────────────────────────────────
  const TOTAL    = 5;
  const CIRCUM   = 2 * Math.PI * 42; // 263.9
  const ringEl   = document.getElementById('ringEl');
  const numEl    = document.getElementById('numEl');
  const secEl    = document.getElementById('secEl');

  let remaining = TOTAL;

  function tick() {
    remaining--;
    numEl.textContent = remaining;
    secEl.textContent = remaining;
    // Progress: offset goes from 0 (full) to CIRCUM (empty)
    const progress = (TOTAL - remaining) / TOTAL;
    ringEl.style.strokeDashoffset = progress * CIRCUM;

    if (remaining <= 0) {
      window.location.href = appUrl;
    }
  }

  // Start ring at 0 offset (fully drawn), then drain it
  ringEl.style.strokeDashoffset = 0;

  // Wait until the card animation is done before starting countdown (~2s)
  setTimeout(() => {
    const interval = setInterval(() => {
      tick();
      if (remaining <= 0) clearInterval(interval);
    }, 1000);
  }, 2000);
</script>

</body>

</html>
