<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — Money Wise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo:  #748FFC;
      --indigo2: #4263EB;
      --green:   #51CF66;
      --green2:  #2F9E44;
      --text:    #F3F4F8;
      --muted:   rgba(243,244,248,0.5);
    }

    html, body {
      height: 100%;
      background: #0F0F14;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow-y: auto;
    }

    /* ── Orbs ── */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
      animation: orbIn 2s ease forwards; opacity: 0;
    }
    .orb-1 {
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(66,99,235,0.38), transparent 70%);
      top: -200px; left: -150px; animation-delay: 0.1s;
    }
    .orb-2 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(81,207,102,0.22), transparent 70%);
      bottom: -130px; right: -110px; animation-delay: 0.3s;
    }
    .orb-3 {
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(116,143,252,0.16), transparent 70%);
      top: 40%; left: 50%; animation-delay: 0.5s;
    }
    @keyframes orbIn { to { opacity: 1; } }

    /* ── Grid ── */
    .grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(116,143,252,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(116,143,252,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
    }

    /* ── Center ── */
    .center {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 32px 24px;
    }

    /* ── Glass card ── */
    .card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 32px;
      padding: 52px 40px 44px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 40px 100px rgba(0,0,0,0.65),
        0 0 100px rgba(116,143,252,0.1);
      opacity: 0;
      transform: translateY(32px) scale(0.96);
      animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Top shine line ── */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      border-radius: 32px 32px 0 0;
    }

    /* ── Logo row ── */
    .logo {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 36px;
      opacity: 0; animation: fadeUp 0.5s ease 0.8s forwards;
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #748FFC, #4263EB);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(116,143,252,0.4);
    }
    .logo-icon img { width: 28px; height: 28px; border-radius: 7px; }
    .logo-name { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }

    /* ── Check icon ── */
    .icon-wrap {
      width: 96px; height: 96px;
      margin: 0 auto 32px;
      position: relative;
      opacity: 0; animation: iconPop 0.7s cubic-bezier(0.34,1.56,0.64,1) 1s forwards;
    }
    @keyframes iconPop {
      from { opacity: 0; transform: scale(0.3) rotate(-20deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    .icon-glow {
      position: absolute; inset: -16px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(81,207,102,0.3), transparent 70%);
      animation: glowPulse 2s ease-in-out 1.7s infinite;
    }
    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50%       { transform: scale(1.15); opacity: 1; }
    }
    .icon-bg {
      width: 96px; height: 96px; border-radius: 26px;
      background: linear-gradient(135deg, #2F9E44, #51CF66);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 16px 48px rgba(47,158,68,0.5);
      position: relative;
    }
    /* Glass sheen on icon */
    .icon-bg::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 50%; border-radius: 26px 26px 0 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent);
    }
    .icon-bg svg {
      width: 48px; height: 48px; stroke: #fff; fill: none;
      stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round;
      position: relative; z-index: 1;
    }

    /* ── Text ── */
    .label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--indigo); margin-bottom: 12px;
      opacity: 0; animation: fadeUp 0.5s ease 1.4s forwards;
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(26px, 6vw, 34px);
      font-weight: 400; line-height: 1.2;
      margin-bottom: 10px;
      opacity: 0; animation: fadeUp 0.5s ease 1.55s forwards;
    }
    h1 em {
      font-style: italic;
      background: linear-gradient(90deg, var(--green), var(--indigo));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 15px; color: var(--muted); line-height: 1.7;
      margin-bottom: 40px;
      opacity: 0; animation: fadeUp 0.5s ease 1.7s forwards;
    }

    /* ── Divider ── */
    .divider {
      height: 1px; margin: 0 -40px 36px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      opacity: 0; animation: fadeUp 0.4s ease 1.75s forwards;
    }

    /* ── Countdown ring ── */
    .ring-wrap {
      position: relative; width: 100px; height: 100px;
      margin: 0 auto 16px;
      opacity: 0; animation: fadeUp 0.5s ease 1.85s forwards;
    }
    .ring-svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: rgba(116,143,252,0.12); stroke-width: 5; }
    .ring-progress {
      fill: none; stroke: url(#rg); stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 276.46;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .ring-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 38px; color: var(--text);
    }

    .redirect-label {
      font-size: 13px; color: var(--muted); margin-bottom: 28px;
      opacity: 0; animation: fadeUp 0.5s ease 2s forwards;
    }
    .redirect-label span { color: var(--indigo); font-weight: 600; }

    /* ── Glass button ── */
    .btn {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 14px 32px; border-radius: 16px; text-decoration: none;
      font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.02em;
      background: linear-gradient(135deg, rgba(116,143,252,0.25), rgba(66,99,235,0.35));
      border: 1px solid rgba(116,143,252,0.35);
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08) inset,
        0 8px 28px rgba(66,99,235,0.35);
      opacity: 0; animation: fadeUp 0.5s ease 2.1s forwards;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      cursor: pointer;
    }
    .btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, rgba(116,143,252,0.35), rgba(66,99,235,0.5));
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1) inset, 0 12px 36px rgba(66,99,235,0.45);
    }
    .btn svg {
      width: 17px; height: 17px; stroke: currentColor; fill: none;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Footer ── */
    .footer {
      position: fixed; bottom: 24px; left: 0; right: 0;
      text-align: center; font-size: 12px;
      color: rgba(243,244,248,0.18);
      opacity: 0; animation: fadeUp 0.5s ease 2.3s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid"></div>

<div class="center">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <img src="https://moneywise-self.vercel.app/logo.png" alt="Money Wise" />
      </div>
      <span class="logo-name">Money Wise</span>
    </div>

    <!-- Icon -->
    <div class="icon-wrap">
      <div class="icon-glow"></div>
      <div class="icon-bg">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>

    <!-- Text -->
    <p class="label">Account Verified</p>
    <h1>Thank you for joining<br><em>Money Wise</em></h1>
    <p class="subtitle">Your email has been confirmed.<br>You'll be taken back to the app automatically.</p>

    <div class="divider"></div>

    <!-- Countdown -->
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#51CF66"/>
            <stop offset="100%" stop-color="#748FFC"/>
          </linearGradient>
        </defs>
        <circle class="ring-track"    cx="50" cy="50" r="44"/>
        <circle class="ring-progress" cx="50" cy="50" r="44" id="ringEl"/>
      </svg>
      <div class="ring-num" id="numEl">5</div>
    </div>

    <p class="redirect-label">Redirecting to app in <span id="secEl">5</span>s…</p>

    <a class="btn" id="openBtn" href="#">
      <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open App Now
    </a>

  </div>
</div>

<div class="footer">© 2025 Money Wise — All rights reserved.</div>

<script>
  function getParams() {
    const hash = window.location.hash.substring(1);
    const params = {};
    hash.split('&').forEach(pair => {
      const [k, v] = pair.split('=');
      if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
    });
    return params;
  }

  const params    = getParams();
  const appScheme = 'io.supabase.moneywise://login-callback/';

  function buildAppUrl() {
    const fragment = Object.entries(params)
      .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
      .join('&');
    return appScheme + (fragment ? '#' + fragment : '');
  }

  const appUrl = buildAppUrl();
  document.getElementById('openBtn').href = appUrl;

  // Countdown
  const TOTAL  = 5;
  const CIRCUM = 2 * Math.PI * 44;
  const ringEl = document.getElementById('ringEl');
  const numEl  = document.getElementById('numEl');
  const secEl  = document.getElementById('secEl');

  ringEl.style.strokeDashoffset = 0;
  let remaining = TOTAL;

  function tick() {
    remaining--;
    numEl.textContent = remaining;
    secEl.textContent = remaining;
    const progress = (TOTAL - remaining) / TOTAL;
    ringEl.style.strokeDashoffset = progress * CIRCUM;
    if (remaining <= 0) openApp();
  }

  function openApp() {
    // Use a hidden iframe to trigger the deep link silently
    // This avoids the "Open with..." Android dialog
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = appUrl;
    document.body.appendChild(iframe);
    // Fallback: if app doesn't open in 2s, use direct location
    setTimeout(() => {
      window.location.href = appUrl;
    }, 2000);
  }

  setTimeout(() => {
    const iv = setInterval(() => {
      tick();
      if (remaining <= 0) clearInterval(iv);
    }, 1000);
  }, 2000);
</script>

</body>
</html>
