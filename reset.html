<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Money Wise — Reset Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F0F14;
      --indigo: #748FFC;
      --indigo2: #4263EB;
      --text: #F3F4F8;
      --muted: rgba(243,244,248,0.45);
    }
    html, body {
      height: 100%; background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .wrap {
      text-align: center; padding: 32px;
      opacity: 0; animation: fadeIn 0.4s ease 0.2s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    .icon {
      width: 72px; height: 72px; border-radius: 20px; margin: 0 auto 24px;
      background: linear-gradient(135deg, #4263EB, #748FFC);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 40px rgba(66,99,235,0.4);
    }
    .icon svg { width: 36px; height: 36px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    p { font-size: 15px; color: var(--muted); }
    .app-btn {
      display: inline-block; margin-top: 24px; padding: 12px 28px;
      background: linear-gradient(135deg, var(--indigo2), var(--indigo));
      color: #fff; text-decoration: none; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      box-shadow: 0 8px 24px rgba(66,99,235,0.4);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <p>Opening Money Wise…</p>
    <a class="app-btn" id="appLink" href="#">If the app didn't open, tap here</a>
  </div>

  <script>
    // Grab all tokens Supabase put in the URL fragment
    function getFragmentParams() {
      // Supabase may use hash fragment or query params depending on flow
      const hash   = window.location.hash.replace(/^#/, '');
      const search = window.location.search.replace(/^\?/, '');
      const raw    = hash || search;
      const p = {};
      raw.split('&').forEach(pair => {
        const idx = pair.indexOf('=');
        if (idx > 0) {
          p[decodeURIComponent(pair.slice(0, idx))] =
            decodeURIComponent(pair.slice(idx + 1));
        }
      });
      return p;
    }

    const params    = getFragmentParams();
    const appScheme = 'io.supabase.moneywise://reset-callback/';

    function buildAppUrl() {
      const frag = Object.entries(params)
        .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
        .join('&');
      return appScheme + (frag ? '#' + frag : '');
    }

    const appUrl = buildAppUrl();
    document.getElementById('appLink').href = appUrl;

    // Redirect immediately — no countdown needed
    window.location.href = appUrl;
  </script>
</body>
</html>
